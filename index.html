<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEMIX 2026 | Dashboard com Edição</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a472a; --bg: #f0ece6; --gold: #f39c12; --green: #28a745; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: var(--primary); color: white; padding: 25px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; background: white; border-radius: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .card { padding: 20px; border: 1px solid #eee; border-radius: 10px; min-height: 350px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: var(--primary); font-weight: 700; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; display: inline-block; }
        .badge-reservado { background: #fff3cd; color: #856404; }
        .badge-assinado { background: #d4edda; color: #155724; }
        .btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-right: 10px; }
        .btn:hover { opacity: 0.9; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 30px; display: none; z-index: 1000; }
        h3 { margin-top: 0; color: var(--primary); }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>FEMIX 2026 - Painel de Gestão</h1>
    <p>Edição direta na tabela - dados sincronizados com Google Sheets</p>
</div>

<div class="container">
    <div>
        <button class="btn" id="btnSalvar">💾 Salvar todas as alterações</button>
        <button class="btn" id="btnRecarregar">🔄 Recarregar dados</button>
        <button class="btn" id="btnAdicionar">➕ Novo expositor</button>
    </div>
    <div class="grid">
        <div class="card"><h3>Vendas por Setor (R$)</h3><canvas id="chartLocal"></canvas></div>
        <div class="card"><h3>Estado dos Contratos (Qtd)</h3><canvas id="chartStatus"></canvas></div>
    </div>
    <h3>Lista Detalhada de Expositores (clique na situação para alterar)</h3>
    <div style="overflow-x: auto;">
        <table id="tabela">
            <thead><tr><th>Local</th><th>Empresa</th><th>Qtd</th><th>Situação</th><th>Valor (R$)</th><th>Ações</th></tr></thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>
</div>
<div id="toast" class="toast">✅ Dados salvos!</div>

<script>
    // URL do Web App do Google Apps Script (que você criou)
    const API_URL = "https://script.google.com/macros/s/SEU_ID/exec"; // SUBSTITUA

    let dados = []; // armazena os dados atuais em memória

    async function carregarDados() {
        try {
            const res = await fetch(API_URL);
            const json = await res.json();
            if (json && json.length > 1) {
                const cabecalho = json[0];
                dados = json.slice(1).map(row => ({
                    Local: row[0],
                    Empresa: row[1],
                    Qtd: row[2],
                    Situacao: row[3],
                    Valor: parseFloat(row[4]) || 0
                }));
            } else {
                dados = [];
            }
            atualizarTabela();
            renderizarGraficos();
        } catch (err) {
            console.error(err);
            alert("Erro ao carregar dados. Verifique a URL do Web App.");
        }
    }

    function atualizarTabela() {
        const tbody = document.getElementById('tabelaCorpo');
        tbody.innerHTML = "";
        dados.forEach((item, idx) => {
            const isAssinado = item.Situacao.toLowerCase().includes('assinado');
            const badgeClass = isAssinado ? 'badge-assinado' : 'badge-reservado';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td contenteditable="true" data-field="Local">${escapeHtml(item.Local)}</td>
                <td contenteditable="true" data-field="Empresa">${escapeHtml(item.Empresa)}</td>
                <td contenteditable="true" data-field="Qtd">${item.Qtd}</td>
                <td><span class="badge ${badgeClass}" data-status="${item.Situacao}" data-idx="${idx}">${item.Situacao}</span></td>
                <td contenteditable="true" data-field="Valor">${item.Valor}</td>
                <td><button class="btn-excluir" data-idx="${idx}">🗑️ Excluir</button></td>
            `;
            // Anexa eventos para edição inline
            tr.querySelectorAll('[contenteditable="true"]').forEach(cell => {
                cell.addEventListener('blur', (e) => {
                    const field = cell.getAttribute('data-field');
                    const newValue = cell.innerText.trim();
                    if (field === 'Valor') {
                        dados[idx][field] = parseFloat(newValue) || 0;
                        cell.innerText = dados[idx][field];
                    } else if (field === 'Qtd') {
                        dados[idx][field] = newValue;
                    } else {
                        dados[idx][field] = newValue;
                    }
                });
            });
            tr.querySelector('.badge').addEventListener('click', (e) => {
                const nova = prompt("Alterar situação (Reservado ou Contrato Assinado):", item.Situacao);
                if (nova && (nova.toLowerCase().includes('reservado') || nova.toLowerCase().includes('assinado'))) {
                    item.Situacao = nova;
                    atualizarTabela(); // recria a tabela para atualizar a cor do badge
                    renderizarGraficos();
                }
            });
            tr.querySelector('.btn-excluir').addEventListener('click', () => {
                if (confirm("Remover este expositor?")) {
                    dados.splice(idx, 1);
                    atualizarTabela();
                    renderizarGraficos();
                }
            });
            tbody.appendChild(tr);
        });
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function salvarDados() {
        try {
            // Prepara os dados para enviar (incluindo cabeçalho)
            const cabecalho = ["Local", "Empresa", "Qtd", "Situação", "Valor"];
            const valores = dados.map(item => [item.Local, item.Empresa, item.Qtd, item.Situacao, item.Valor]);
            const payload = [cabecalho, ...valores];
            const res = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', // necessário para Apps Script sem CORS complexo
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            mostrarToast("✅ Dados salvos com sucesso!");
        } catch (err) {
            mostrarToast("❌ Erro ao salvar: " + err.message, true);
        }
    }

    function mostrarToast(msg, erro = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.backgroundColor = erro ? '#c0392b' : '#2c3e50';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function renderizarGraficos() {
        // Agrupa por Local (soma dos valores)
        const porLocal = {};
        const porStatus = { "Reservado": 0, "Contrato Assinado": 0 };
        dados.forEach(item => {
            porLocal[item.Local] = (porLocal[item.Local] || 0) + item.Valor;
            const isAssinado = item.Situacao.toLowerCase().includes('assinado');
            if (isAssinado) porStatus["Contrato Assinado"]++;
            else porStatus["Reservado"]++;
        });
        // Destruir gráficos antigos se existirem
        if (window.chartLocal) window.chartLocal.destroy();
        if (window.chartStatus) window.chartStatus.destroy();
        window.chartLocal = new Chart(document.getElementById('chartLocal'), {
            type: 'bar',
            data: { labels: Object.keys(porLocal), datasets: [{ label: 'Total R$', data: Object.values(porLocal), backgroundColor: '#1a472a' }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
        window.chartStatus = new Chart(document.getElementById('chartStatus'), {
            type: 'doughnut',
            data: { labels: Object.keys(porStatus), datasets: [{ data: Object.values(porStatus), backgroundColor: ['#f39c12', '#28a745'] }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    document.getElementById('btnSalvar').addEventListener('click', salvarDados);
    document.getElementById('btnRecarregar').addEventListener('click', carregarDados);
    document.getElementById('btnAdicionar').addEventListener('click', () => {
        dados.push({ Local: "Externo - Demais Espaços", Empresa: "Nova Empresa", Qtd: "1", Situacao: "Reservado", Valor: 5000 });
        atualizarTabela();
        renderizarGraficos();
    });

    carregarDados();
</script>
</body>
</html>
