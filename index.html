<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEMIX 2026 | Dashboard (versão teste)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0ece6; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 2rem; padding: 2rem; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1rem; margin-bottom: 2rem; }
        .kpi-card { background: #faf7f2; border-radius: 1.5rem; padding: 1rem; text-align: center; }
        .kpi-value { font-size: 2rem; font-weight: 800; color: #0B2B40; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border-bottom: 1px solid #e8dccc; padding: 0.5rem; text-align: left; }
        th { background: #F9F1E8; }
        .btn { background: #FFC107; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; margin-right: 0.5rem; }
        .login-btn { background: #E67E22; color: white; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>FEMIX 2026 - Dashboard de Vendas</h1>
    <div id="kpiArea" class="kpi-grid"></div>
    <div id="tableArea"></div>
</div>
<script>
    // Dados embutidos
    const dados = [
        { empresa: "Crecerto", local: "Tancredão - Ind e Com", quantidade: 2, situacao: "Reservado", valor: 13184 },
        { empresa: "Detalhes Móveis", local: "Tancredão - Ind e Com", quantidade: 2, situacao: "Reservado", valor: 18952 },
        { empresa: "Consórcio Itá", local: "Tancredão - Ind e Com", quantidade: 2, situacao: "Reservado", valor: 9888 },
        { empresa: "Fischer Móveis", local: "Tancredão - Ind e Com", quantidade: 2, situacao: "Reservado", valor: 9888 },
        { empresa: "BTM Brindes", local: "Tancredão - Ind e Com", quantidade: 2, situacao: "Contrato Assinado", valor: 9888 },
        // Adicione mais linhas conforme necessário, mas já teremos visibilidade
    ];
    function atualizar() {
        const totalRev = dados.reduce((s,i)=>s+i.valor,0);
        const totalEmp = dados.length;
        const totalEstandes = dados.reduce((acc,i)=>acc+i.quantidade,0);
        const kpiHTML = `
            <div class="kpi-card"><div class="kpi-title">💰 RECEITA TOTAL</div><div class="kpi-value">R$ ${totalRev.toLocaleString()}</div></div>
            <div class="kpi-card"><div class="kpi-title">🏢 EMPRESAS</div><div class="kpi-value">${totalEmp}</div></div>
            <div class="kpi-card"><div class="kpi-title">📊 ESTANDES</div><div class="kpi-value">${totalEstandes}</div></div>
        `;
        document.getElementById("kpiArea").innerHTML = kpiHTML;
        let tabela = '<table><thead><tr><th>Empresa</th><th>Local</th><th>Qtde</th><th>Valor</th><th>Situação</th></tr></thead><tbody>';
        dados.forEach(d => {
            tabela += `<tr><td>${d.empresa}</td><td>${d.local}</td><td>${d.quantidade}</td><td>R$ ${d.valor.toLocaleString()}</td><td>${d.situacao}</td></tr>`;
        });
        tabela += '</tbody></table>';
        document.getElementById("tableArea").innerHTML = tabela;
    }
    atualizar();
</script>
</body>
</html>
